# 跨仓库触发工作流
# 部署在需要被监控的仓库中
# 当 Issue 被打上 rfc/bug 标签时，向 dev-workflow 仓库发送 repository_dispatch 事件

name: "Cross-Repo: Dispatch to dev-workflow"

on:
  issues:
    types: [labeled, opened]

permissions:
  issues: read
  contents: read

jobs:
  dispatch:
    runs-on: ubuntu-latest
    if: |
      (github.event.action == 'labeled' && (github.event.label.name == 'rfc' || github.event.label.name == 'bug')) ||
      (github.event.action == 'opened' && (contains(github.event.issue.labels.*.name, 'rfc') || contains(github.event.issue.labels.*.name, 'bug')))

    steps:
      - name: Checkout source repo code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          path: source-repo

      - name: Discover project conventions
        id: conventions
        run: |
          echo "🔍 Discovering project conventions..."
          
          CONVENTIONS=""
          
          # 查找常见的规范文件
          for file in .github/CODE_OF_CONDUCT.md CONTRIBUTING.md .github/CONTRIBUTING.md \
                      docs/ARCHITECTURE.md docs/DESIGN_PRINCIPLES.md \
                      docs/TECH_STACK.md docs/CODE_STYLE.md \
                      ARCHITECTURE.md DESIGN_PRINCIPLES.md \
                      .eslintrc* .prettierrc* pyproject.toml setup.cfg \
                      .editorconfig CLAUDE.md .cursorrules; do
            if [ -f "source-repo/$file" ]; then
              CONVENTIONS="$CONVENTIONS\n- $file"
            fi
          done
          
          # 查找项目描述文件
          if [ -f "source-repo/package.json" ]; then
            CONVENTIONS="$CONVENTIONS\n- package.json (项目元数据)"
          fi
          if [ -f "source-repo/README.md" ]; then
            CONVENTIONS="$CONVENTIONS\n- README.md (项目说明)"
          fi
          
          if [ -z "$CONVENTIONS" ]; then
            CONVENTIONS="\n(未发现明确的规范文件)"
          fi
          
          echo "Found convention files: $CONVENTIONS"
          echo "conventions_list=$(echo -e "$CONVENTIONS" | head -20)" >> $GITHUB_OUTPUT

      - name: Send dispatch to dev-workflow
        run: |
          PAYLOAD=$(cat <<EOF
          {
            "event_type": "issue-trigger",
            "client_payload": {
              "issue_number": ${{ github.event.issue.number }},
              "issue_title": "${{ github.event.issue.title }}",
              "issue_body": "${{ github.event.issue.body }}",
              "source_repo": "${{ github.repository }}",
              "source_owner": "${{ github.repository_owner }}",
              "labels": $(echo '${{ toJSON(github.event.issue.labels) }}'),
              "action": "${{ github.event.action }}",
              "has_conventions": true
            }
          }
          EOF
          )

          echo "Dispatching to ZhengZhenyu/dev-workflow..."
          echo "Payload: $PAYLOAD"

          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" -X POST \
            -H "Authorization: token ${{ secrets.DISPATCH_TOKEN }}" \
            -H "Accept: application/vnd.github.everest-preview+json" \
            -H "Content-Type: application/json" \
            https://api.github.com/repos/ZhengZhenyu/dev-workflow/dispatches \
            -d "$PAYLOAD")

          if [ "$RESPONSE" -eq 204 ]; then
            echo "✅ Dispatch sent successfully"
          else
            echo "❌ Dispatch failed with HTTP $RESPONSE"
            echo "Make sure DISPATCH_TOKEN secret is configured with correct permissions"
            exit 1
          fi

      - name: Add ai-pending label
        uses: actions/github-script@v7
        with:
          script: |
            try {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                labels: ['ai-pending']
              });
            } catch (e) {
              console.log('Label may already exist:', e.message);
            }
