name: "tech-design-team: AI 分析链路"

on:
  repository_dispatch:
    types: [run-phase]

concurrency:
  group: tech-design-${{ github.event.client_payload.issue_number }}-${{ github.event.client_payload.source_repo }}
  cancel-in-progress: false

permissions:
  issues: write
  contents: read

env:
  AI_MODEL: ${{ vars.AI_MODEL || 'alibaba-cn/glm-5.1' }}
  AI_AGENT: ${{ vars.AI_AGENT || 'build' }}
  AI_EXTRA_ARGS: ${{ vars.AI_EXTRA_ARGS || '--dangerously-skip-permissions' }}
  OPENCODE_TIMEOUT_MS: ${{ vars.OPENCODE_TIMEOUT_MS || '600000' }}
  DASHSCOPE_API_KEY: ${{ secrets.OPENAI_API_KEY || '' }}

jobs:
  init:
    runs-on: ubuntu-latest
    if: github.event.action == 'run-phase' && github.event.client_payload.phase == 'init'
    env:
      SOURCE_REPO: ${{ github.event.client_payload.source_repo }}
      ISSUE_NUMBER: ${{ github.event.client_payload.issue_number }}
      ISSUE_TITLE: ${{ github.event.client_payload.issue_title }}
      ISSUE_BODY: ${{ github.event.client_payload.issue_body }}
    outputs:
      has_conventions: ${{ steps.conventions.outputs.has_conventions }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Checkout source repo
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.client_payload.source_repo }}
          token: ${{ secrets.WATCH_TOKEN || secrets.DISPATCH_TOKEN }}
          fetch-depth: 1
          path: source-repo

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install OpenCode
        run: |
          npm install -g opencode-ai
          opencode --version

      - name: Load conventions
        id: conventions
        run: python scripts/lib/discover_conventions.py source-repo source-conventions.md

      - name: Ensure labels
        run: python scripts/lib/phase_helper.py ensure-labels

      - name: Add labels
        run: python scripts/lib/phase_helper.py add-labels

      - name: Post progress board
        run: python scripts/lib/phase_helper.py post-board

      - name: Auto-trigger Phase 1
        run: python scripts/lib/phase_helper.py self-dispatch phase1

  phase1:
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'repository_dispatch' &&
      github.event.action == 'run-phase' &&
      github.event.client_payload.phase == 'phase1'
    env:
      SOURCE_REPO: ${{ github.event.client_payload.source_repo }}
      ISSUE_NUMBER: ${{ github.event.client_payload.issue_number }}
      ISSUE_TITLE: ${{ github.event.client_payload.issue_title }}
      ISSUE_BODY: ${{ github.event.client_payload.issue_body }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Checkout source repo
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.client_payload.source_repo }}
          token: ${{ secrets.WATCH_TOKEN || secrets.DISPATCH_TOKEN }}
          fetch-depth: 1
          path: source-repo

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install OpenCode
        run: |
          npm install -g opencode-ai
          opencode --version

      - name: Load conventions
        run: python scripts/lib/discover_conventions.py source-repo source-conventions.md

      - name: Prepare work dir
        run: |
          mkdir -p "$HOME/tech-design-data/work/$ISSUE_NUMBER"
          ln -sf "$(pwd)/source-repo" "$HOME/tech-design-data/work/$ISSUE_NUMBER/source-repo"
          ln -sf "$(pwd)/source-conventions.md" "$HOME/tech-design-data/work/$ISSUE_NUMBER/source-conventions.md"

      - name: Mark phase running
        run: python scripts/lib/phase_helper.py set-label phase1 running

      - name: Run Phase 1
        env:
          GITHUB_TOKEN: ${{ secrets.WATCH_TOKEN || secrets.DISPATCH_TOKEN }}
          TARGET_REPO: ${{ github.event.client_payload.source_repo }}
        run: python scripts/stages/01-requirements-analysis.py

      - name: Update progress board
        if: success()
        run: python scripts/lib/phase_helper.py update-board phase1 done

      - name: Mark failed
        if: failure()
        run: python scripts/lib/phase_helper.py update-board phase1 failed

  phase2:
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'repository_dispatch' &&
      github.event.action == 'run-phase' &&
      github.event.client_payload.phase == 'phase2'
    env:
      SOURCE_REPO: ${{ github.event.client_payload.source_repo }}
      ISSUE_NUMBER: ${{ github.event.client_payload.issue_number }}
      ISSUE_TITLE: ${{ github.event.client_payload.issue_title }}
      ISSUE_BODY: ${{ github.event.client_payload.issue_body }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Checkout source repo
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.client_payload.source_repo }}
          token: ${{ secrets.WATCH_TOKEN || secrets.DISPATCH_TOKEN }}
          fetch-depth: 1
          path: source-repo

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install OpenCode
        run: |
          npm install -g opencode-ai
          opencode --version

      - name: Load conventions
        run: python scripts/lib/discover_conventions.py source-repo source-conventions.md

      - name: Prepare work dir
        run: |
          mkdir -p "$HOME/tech-design-data/work/$ISSUE_NUMBER"
          ln -sf "$(pwd)/source-repo" "$HOME/tech-design-data/work/$ISSUE_NUMBER/source-repo"
          ln -sf "$(pwd)/source-conventions.md" "$HOME/tech-design-data/work/$ISSUE_NUMBER/source-conventions.md"

      - name: Mark phase running
        run: python scripts/lib/phase_helper.py set-label phase2 running

      - name: Run Phase 2
        env:
          GITHUB_TOKEN: ${{ secrets.WATCH_TOKEN || secrets.DISPATCH_TOKEN }}
          TARGET_REPO: ${{ github.event.client_payload.source_repo }}
        run: python scripts/stages/02-architecture-design.py

      - name: Update progress board
        if: success()
        run: python scripts/lib/phase_helper.py update-board phase2 done

      - name: Mark failed
        if: failure()
        run: python scripts/lib/phase_helper.py update-board phase2 failed

  phase3:
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'repository_dispatch' &&
      github.event.action == 'run-phase' &&
      github.event.client_payload.phase == 'phase3'
    env:
      SOURCE_REPO: ${{ github.event.client_payload.source_repo }}
      ISSUE_NUMBER: ${{ github.event.client_payload.issue_number }}
      ISSUE_TITLE: ${{ github.event.client_payload.issue_title }}
      ISSUE_BODY: ${{ github.event.client_payload.issue_body }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Checkout source repo
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.client_payload.source_repo }}
          token: ${{ secrets.WATCH_TOKEN || secrets.DISPATCH_TOKEN }}
          fetch-depth: 1
          path: source-repo

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install OpenCode
        run: |
          npm install -g opencode-ai
          opencode --version

      - name: Load conventions
        run: python scripts/lib/discover_conventions.py source-repo source-conventions.md

      - name: Prepare work dir
        run: |
          mkdir -p "$HOME/tech-design-data/work/$ISSUE_NUMBER"
          ln -sf "$(pwd)/source-repo" "$HOME/tech-design-data/work/$ISSUE_NUMBER/source-repo"
          ln -sf "$(pwd)/source-conventions.md" "$HOME/tech-design-data/work/$ISSUE_NUMBER/source-conventions.md"

      - name: Mark phase running
        run: python scripts/lib/phase_helper.py set-label phase3 running

      - name: Run Phase 3
        env:
          GITHUB_TOKEN: ${{ secrets.WATCH_TOKEN || secrets.DISPATCH_TOKEN }}
          TARGET_REPO: ${{ github.event.client_payload.source_repo }}
        run: python scripts/stages/03-architecture-review.py

      - name: Update progress board
        if: success()
        run: python scripts/lib/phase_helper.py update-board phase3 done

      - name: Mark failed
        if: failure()
        run: python scripts/lib/phase_helper.py update-board phase3 failed
