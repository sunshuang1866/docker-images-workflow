name: "Watch: Monitor PRs for CI Failures"

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:
    inputs:
      test_repo:
        description: '测试特定仓库 (owner/repo)'
        required: false
        type: string

permissions:
  contents: read

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Process PR events
        env:
          WATCH_TOKEN: ${{ secrets.WATCH_TOKEN }}
          DISPATCH_TOKEN: ${{ secrets.DISPATCH_TOKEN }}
        run: |
          python scripts/watch/process_pr_events.py

      - name: Report status
        if: always()
        run: echo "✅ PR monitoring cycle completed"
