# 事件流监听工作流
# 在 dev-workflow 仓库中运行，定时检查所有监控仓库的 Issue 事件
# 源仓库无需任何配置，只需创建 Issue 并打标签

name: "Watch: Monitor Issues"

on:
  schedule:
    # 每 5 分钟执行一次（可根据需要调整）
    - cron: '*/5 * * * *'
  workflow_dispatch:
    inputs:
      test_repo:
        description: '测试特定仓库 (owner/repo)'
        required: false
        type: string

permissions:
  issues: write
  contents: read

env:
  # AI 模型配置
  AI_MODEL: ${{ vars.AI_MODEL || 'alibaba-cn/glm-5.1' }}
  AI_AGENT: ${{ vars.AI_AGENT || 'build' }}
  AI_EXTRA_ARGS: ${{ vars.AI_EXTRA_ARGS || '--dangerously-skip-permissions' }}
  OPENCODE_TIMEOUT_MS: ${{ vars.OPENCODE_TIMEOUT_MS || '1800000' }}
  
  # AI API 密钥（必需）
  OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY || '' }}
  OPENAI_BASE_URL: ${{ vars.OPENAI_BASE_URL || '' }}

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout dev-workflow code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Process events
        env:
          WATCH_TOKEN: ${{ secrets.WATCH_TOKEN }}
          DISPATCH_TOKEN: ${{ secrets.DISPATCH_TOKEN }}
          TEST_REPO: ${{ github.event.inputs.test_repo || '' }}
        run: |
          python scripts/watch/process_events.py

      - name: Report status
        if: always()
        run: |
          echo "✅ Monitoring cycle completed"
          echo "Check logs for any issues"
