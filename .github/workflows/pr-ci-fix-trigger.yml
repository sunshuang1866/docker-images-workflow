name: "ci-fix-team: PR CI 修复链路"

on:
  repository_dispatch:
    types: [run-ci-fix-phase]

# 同一个 PR 的修复串行执行，避免并发冲突
concurrency:
  group: ci-fix-${{ github.event.client_payload.source_repo }}-${{ github.event.client_payload.pr_number }}
  cancel-in-progress: false

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

  # ── 通用 ──────────────────────────────────────────────────────────
  AI_RUNNER: ${{ vars.AI_RUNNER || 'opencode' }}
  GITCODE_FORK_REPO: ${{ vars.GITCODE_FORK_REPO || '' }}

  # ── OpenCode 配置（AI_RUNNER=opencode 时生效）─────────────────────
  AI_MODEL: ${{ vars.AI_MODEL || 'alibaba-cn/glm-5.1' }}
  AI_AGENT: ${{ vars.AI_AGENT || 'build' }}
  AI_EXTRA_ARGS: ${{ vars.AI_EXTRA_ARGS || '--dangerously-skip-permissions' }}
  OPENCODE_TIMEOUT_MS: ${{ vars.OPENCODE_TIMEOUT_MS || '600000' }}
  OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY || '' }}
  DEEPSEEK_API_KEY: ${{ secrets.OPENAI_API_KEY || '' }}
  OPENAI_BASE_URL: ${{ vars.OPENAI_BASE_URL || '' }}

  # ── Claude Code 配置（AI_RUNNER=claude-code / claude-code-account 时生效）──
  CLAUDE_MODEL: ${{ vars.CLAUDE_MODEL || 'claude-sonnet-4-6' }}
  CLAUDE_EXTRA_ARGS: ${{ vars.CLAUDE_EXTRA_ARGS || '--dangerously-skip-permissions' }}
  CLAUDE_TIMEOUT_MS: ${{ vars.CLAUDE_TIMEOUT_MS || '600000' }}
  ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY || '' }}

jobs:

  # ── 阶段 1: CI 日志分析 ──────────────────────────────────────────
  ci-log-analysis:
    runs-on: ubuntu-latest
    if: |
      github.event.action == 'run-ci-fix-phase' &&
      github.event.client_payload.phase == 'ci-log-analysis'
    env:
      SOURCE_REPO: ${{ github.event.client_payload.source_repo }}
      SOURCE_PLATFORM: ${{ github.event.client_payload.source_platform || 'github' }}
      PR_NUMBER: ${{ github.event.client_payload.pr_number }}
      PR_TITLE: ${{ github.event.client_payload.pr_title }}
      HEAD_SHA: ${{ github.event.client_payload.head_sha }}
      FIX_BRANCH: ${{ github.event.client_payload.fix_branch }}
      PR_BASE_BRANCH: ${{ github.event.client_payload.pr_base_branch }}
      GITHUB_TOKEN: ${{ secrets.WATCH_TOKEN || secrets.DISPATCH_TOKEN }}
      GITCODE_WATCH_TOKEN: ${{ secrets.GITCODE_WATCH_TOKEN || '' }}

    steps:
      - name: Checkout docker-images-workflow
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Checkout source repo (GitHub)
        if: env.SOURCE_PLATFORM != 'gitcode'
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.client_payload.source_repo }}
          token: ${{ secrets.WATCH_TOKEN || secrets.DISPATCH_TOKEN }}
          fetch-depth: 1
          path: source-repo

      - name: Checkout source repo (GitCode)
        if: env.SOURCE_PLATFORM == 'gitcode'
        run: |
          git clone --depth=1 \
            https://oauth2:${{ secrets.GITCODE_WATCH_TOKEN }}@gitcode.com/${{ env.SOURCE_REPO }}.git \
            source-repo

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Setup Claude Code account credentials
        if: env.AI_RUNNER == 'claude-code-account'
        env:
          CLAUDE_CREDENTIALS_JSON: ${{ secrets.CLAUDE_CREDENTIALS_JSON }}
        run: |
          mkdir -p ~/.claude
          echo "$CLAUDE_CREDENTIALS_JSON" > ~/.claude/.credentials.json
          chmod 600 ~/.claude/.credentials.json

      - name: Install AI Agent
        run: |
          if [ "$AI_RUNNER" = "claude-code" ] || [ "$AI_RUNNER" = "claude-code-account" ]; then
            npm install -g @anthropic-ai/claude-code
            claude --version
          else
            npm install -g opencode-ai
            opencode --version
          fi

      - name: Load conventions
        run: python scripts/lib/discover_conventions.py source-repo source-conventions.md

      - name: Run CI 日志分析
        run: python scripts/stages/ci-log-analysis.py

      - name: Mark failed
        if: failure()
        env:
          WATCH_TOKEN: ${{ secrets.WATCH_TOKEN || secrets.DISPATCH_TOKEN }}
          GITCODE_WRITE_TOKEN: ${{ secrets.GITCODE_WRITE_TOKEN || '' }}
        run: |
          python - <<'EOF'
          import os, sys
          sys.path.insert(0, '.')
          from scripts.lib.ci_api import get_api
          platform = os.environ.get('SOURCE_PLATFORM', 'github')
          api = get_api(platform)
          repo = os.environ['SOURCE_REPO']
          pr = int(os.environ['PR_NUMBER'])
          token = os.environ.get('GITCODE_WRITE_TOKEN') or os.environ['WATCH_TOKEN']
          try:
              api.add_pr_comment(repo, pr, "⚠️ CI 日志分析阶段失败，请检查 workflow 日志。", token)
          except Exception as e:
              print(f"⚠️ PR comment failed (non-fatal): {e}")
          EOF

  # ── 阶段 2: 代码修复 ────────────────────────────────────────────
  code-fix:
    runs-on: ubuntu-latest
    if: |
      github.event.action == 'run-ci-fix-phase' &&
      github.event.client_payload.phase == 'code-fix'
    env:
      SOURCE_REPO: ${{ github.event.client_payload.source_repo }}
      SOURCE_PLATFORM: ${{ github.event.client_payload.source_platform || 'github' }}
      PR_NUMBER: ${{ github.event.client_payload.pr_number }}
      PR_TITLE: ${{ github.event.client_payload.pr_title }}
      PR_HEAD_SHA: ${{ github.event.client_payload.pr_head_sha }}
      FIX_BRANCH: ${{ github.event.client_payload.fix_branch }}
      PR_BASE_BRANCH: ${{ github.event.client_payload.pr_base_branch }}
      ANALYSIS: ${{ github.event.client_payload.analysis }}
      GITHUB_TOKEN: ${{ secrets.WATCH_TOKEN || secrets.DISPATCH_TOKEN }}
      GITCODE_WRITE_TOKEN: ${{ secrets.GITCODE_WRITE_TOKEN || '' }}

    steps:
      - name: Checkout docker-images-workflow
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Checkout source repo (GitHub)
        if: env.SOURCE_PLATFORM != 'gitcode'
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.client_payload.source_repo }}
          token: ${{ secrets.WRITE_TOKEN }}
          fetch-depth: 0
          path: source-repo

      - name: Checkout source repo (GitCode)
        if: env.SOURCE_PLATFORM == 'gitcode'
        run: |
          git clone \
            https://oauth2:${{ secrets.GITCODE_WRITE_TOKEN }}@gitcode.com/${{ env.SOURCE_REPO }}.git \
            source-repo

      - name: Setup fix branch
        run: |
          cd source-repo
          git config user.name "${{ vars.GIT_COMMIT_NAME || 'github-actions[bot]' }}"
          git config user.email "${{ vars.GIT_COMMIT_EMAIL || 'github-actions[bot]@users.noreply.github.com' }}"

          if [ "$SOURCE_PLATFORM" = "gitcode" ]; then
            # GitCode: 直接 fetch PR head ref
            git fetch origin refs/merge-requests/${{ env.PR_NUMBER }}/head:pr-head 2>/dev/null || \
              git fetch origin ${{ env.PR_HEAD_SHA }} 2>/dev/null || true
          else
            git fetch origin pull/${{ env.PR_NUMBER }}/head
          fi

          if git ls-remote --exit-code --heads origin ${{ env.FIX_BRANCH }}; then
            git fetch origin ${{ env.FIX_BRANCH }}
            git checkout -b ${{ env.FIX_BRANCH }} origin/${{ env.FIX_BRANCH }}
          else
            git checkout ${{ env.PR_HEAD_SHA }} 2>/dev/null || git checkout FETCH_HEAD
            git checkout -b ${{ env.FIX_BRANCH }}
          fi

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Setup Claude Code account credentials
        if: env.AI_RUNNER == 'claude-code-account'
        env:
          CLAUDE_CREDENTIALS_JSON: ${{ secrets.CLAUDE_CREDENTIALS_JSON }}
        run: |
          mkdir -p ~/.claude
          echo "$CLAUDE_CREDENTIALS_JSON" > ~/.claude/.credentials.json
          chmod 600 ~/.claude/.credentials.json

      - name: Install AI Agent
        run: |
          if [ "$AI_RUNNER" = "claude-code" ] || [ "$AI_RUNNER" = "claude-code-account" ]; then
            npm install -g @anthropic-ai/claude-code
            claude --version
          else
            npm install -g opencode-ai
            opencode --version
          fi

      - name: Load conventions
        run: python scripts/lib/discover_conventions.py source-repo source-conventions.md

      - name: Run 代码修复
        run: python scripts/stages/code-fix.py

      - name: Remove AI artifacts from fix branch
        run: |
          cd source-repo
          for pattern in ".claude" ".opencode" "__pycache__" ".aider" ".agents"; do
            find . -name "$pattern" -not -path "./.git/*" | while read p; do
              git rm -rf --cached "$p" 2>/dev/null || true
              rm -rf "$p"
            done
          done
          find . -name "*.pyc" -o -name "*.pyo" | grep -v ".git" | while read p; do
            git rm -f --cached "$p" 2>/dev/null || true
            rm -f "$p"
          done
          if ! git diff --cached --quiet; then
            git commit -m "chore: remove AI-generated artifacts"
          fi

      - name: Push fix branch
        run: |
          cd source-repo
          if [ "$SOURCE_PLATFORM" = "gitcode" ]; then
            PUSH_REPO="${GITCODE_FORK_REPO:-$SOURCE_REPO}"
            git remote set-url origin \
              https://oauth2:${{ secrets.GITCODE_WRITE_TOKEN }}@gitcode.com/${PUSH_REPO}.git
          else
            git remote set-url origin \
              https://x-access-token:${{ secrets.WRITE_TOKEN }}@github.com/${{ env.SOURCE_REPO }}.git
          fi
          git push origin "+refs/heads/${{ env.FIX_BRANCH }}:refs/heads/${{ env.FIX_BRANCH }}"

      - name: Create fix PR if not exists
        env:
          GH_TOKEN: ${{ secrets.WRITE_TOKEN }}
          GITCODE_WRITE_TOKEN: ${{ secrets.GITCODE_WRITE_TOKEN || '' }}
        run: |
          if [ "$SOURCE_PLATFORM" = "gitcode" ]; then
            python - <<'EOF'
          import os, sys
          sys.path.insert(0, '.')
          from scripts.lib.ci_gitcode_api import find_any_pr_by_head_branch, create_pull_request
          repo      = os.environ['SOURCE_REPO']
          fork_repo = os.environ.get('GITCODE_FORK_REPO', '').strip() or repo
          token     = os.environ['GITCODE_WRITE_TOKEN']
          fix_br    = os.environ['FIX_BRANCH']
          pr_num    = os.environ['PR_NUMBER']
          pr_title  = os.environ['PR_TITLE']
          base_br   = os.environ['PR_BASE_BRANCH']
          # head 格式：同仓库用分支名，跨仓库(fork)用 "fork_owner:branch"
          if fork_repo != repo:
              fork_owner = fork_repo.split('/')[0]
              head = f"{fork_owner}:{fix_br}"
          else:
              head = fix_br
          existing = find_any_pr_by_head_branch(repo, fix_br, token)
          if not existing:
              try:
                  create_pull_request(
                      repo, head, base_br,
                      f"fix: AI-generated CI fix for PR #{pr_num}",
                      f"Automated fix for CI failures in PR #{pr_num}\n\n"
                      f"**Original PR**: #{pr_num} — {pr_title}\n\n---\n🤖 Generated by ci-fix-team",
                      token,
                  )
                  print("✅ Fix PR created on GitCode")
              except Exception as e:
                  if 'already exists' in str(e).lower() or '422' in str(e):
                      print(f"✅ Fix PR already exists (detected on create), new commit pushed")
                  else:
                      raise
          else:
              print(f"✅ Fix PR already exists (#{existing['number']}), new commit pushed")
          EOF
          else
            PR_EXISTS=$(gh pr list \
              --repo ${{ env.SOURCE_REPO }} \
              --head ${{ env.FIX_BRANCH }} \
              --state open \
              --json number \
              -q '.[0].number' 2>/dev/null || echo "")
            if [ -z "$PR_EXISTS" ]; then
              gh pr create \
                --repo ${{ env.SOURCE_REPO }} \
                --title "fix: AI-generated CI fix for PR #${{ env.PR_NUMBER }}" \
                --body "Automated fix for CI failures in PR #${{ env.PR_NUMBER }}

          **Original PR**: #${{ env.PR_NUMBER }} — ${{ env.PR_TITLE }}

          ---
          🤖 Generated by ci-fix-team" \
                --head ${{ env.FIX_BRANCH }} \
                --base ${{ env.PR_BASE_BRANCH }}
              echo "✅ Fix PR created on GitHub"
            else
              echo "✅ Fix PR #$PR_EXISTS already exists, new commit pushed"
            fi
          fi

      - name: Mark failed
        if: failure()
        env:
          WATCH_TOKEN: ${{ secrets.WATCH_TOKEN || secrets.DISPATCH_TOKEN }}
          GITCODE_WRITE_TOKEN: ${{ secrets.GITCODE_WRITE_TOKEN || '' }}
        run: |
          python - <<'EOF'
          import os, sys
          sys.path.insert(0, '.')
          from scripts.lib.ci_api import get_api
          platform = os.environ.get('SOURCE_PLATFORM', 'github')
          api = get_api(platform)
          repo = os.environ['SOURCE_REPO']
          pr = int(os.environ['PR_NUMBER'])
          token = os.environ.get('GITCODE_WRITE_TOKEN') or os.environ['WATCH_TOKEN']
          try:
              api.add_pr_comment(repo, pr, "⚠️ 代码修复阶段失败，请检查 workflow 日志。", token)
          except Exception as e:
              print(f"⚠️ PR comment failed (non-fatal): {e}")
          EOF
